<body>
  <div id="game">
    <!-- Title screen -->
    <section id="screen-title" class="screen active">
      <div class="title-bg" id="title-bg"></div>
      <div class="title-box">
        <div class="logo-wrap" id="logo-wrap"></div>
        <p class="tagline">ตำนานผู้กล้าแห่งดินแดนอีเธอเรีย</p>
        <div class="title-buttons">
          <button id="btn-new" class="btn btn-primary">เริ่มเกมใหม่</button>
          <button id="btn-continue" class="btn">เล่นต่อ</button>
        </div>
        <div id="account-box" class="account-box">
          <button id="btn-auth" class="btn small">เข้าสู่ระบบ / สมัคร</button>
        </div>
      </div>
    </section>

    <!-- Character creation -->
    <section id="screen-create" class="screen">
      <div class="panel">
        <h2>สร้างตัวละคร</h2>
        <label class="field">
          <span>ชื่อผู้กล้า</span>
          <input id="hero-name" type="text" maxlength="12" placeholder="ใส่ชื่อ..." value="ผู้กล้า" />
        </label>
        <p class="field-label">เลือกอาชีพ</p>
        <div id="class-list" class="class-list"></div>
        <button id="btn-start" class="btn btn-primary">ออกผจญภัย</button>
      </div>
    </section>

    <!-- Overworld -->
    <section id="screen-world" class="screen">
      <div class="world-stage" id="world-stage">
        <canvas id="map-canvas"></canvas>
        <div class="stage-vignette"></div>
      </div>

      <div class="world-ui">
        <div class="hud-zone">
          <div class="hud">
            <div class="hud-portrait" id="hud-portrait">
              <span class="lv-badge">Lv<b id="hud-level">1</b></span>
            </div>
            <div class="hud-main">
              <div class="hud-top">
                <span id="hud-name">-</span>
                <span class="hud-class" id="hud-class"></span>
                <span class="gold">💰<b id="hud-gold">0</b></span>
              </div>
              <div class="bar bar-hp"><i id="bar-hp"></i><span id="txt-hp"></span></div>
              <div class="bar bar-mp"><i id="bar-mp"></i><span id="txt-mp"></span></div>
              <div class="bar bar-exp"><i id="bar-exp"></i><span id="txt-exp"></span></div>
            </div>
          </div>
          <div class="chapter-tab" id="chapter-tab"></div>
          <div id="map-name" class="map-name">-</div>
        </div>

        <div class="controls">
          <div class="dpad">
            <button class="dbtn up" data-dir="up">▲</button>
            <button class="dbtn left" data-dir="left">◀</button>
            <button class="dbtn action" data-act="interact">✦</button>
            <button class="dbtn right" data-dir="right">▶</button>
            <button class="dbtn down" data-dir="down">▼</button>
          </div>
          <div class="menu-buttons">
            <button class="btn small" data-menu="stats">ตัวละคร</button>
            <button class="btn small" data-menu="inventory">กระเป๋า</button>
            <button class="btn small" data-menu="quests">เนื้อเรื่อง</button>
            <button class="btn small" data-menu="pets">สัตว์เลี้ยง</button>
            <button class="btn small" data-menu="save">บันทึก</button>
            <button class="btn small danger" data-menu="logout">ออกจากระบบ</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Battle -->
    <section id="screen-battle" class="screen">
      <div class="battle-field">
        <div class="enemy-side">
          <canvas id="enemy-sprite" class="sprite enemy" width="96" height="96"></canvas>
          <div class="unit-name" id="enemy-name">มอนสเตอร์</div>
          <div class="bar bar-hp small"><i id="enemy-hp-bar"></i></div>
        </div>
        <div class="hero-side">
          <canvas id="hero-sprite" class="sprite hero" width="96" height="96"></canvas>
          <div class="unit-name" id="battle-hero-name">ผู้กล้า</div>
          <div class="bar bar-hp small"><i id="hero-hp-bar"></i><span id="hero-hp-txt"></span></div>
          <div class="bar bar-mp small"><i id="hero-mp-bar"></i><span id="hero-mp-txt"></span></div>
        </div>
      </div>
      <div id="battle-log" class="battle-log"></div>
      <div id="battle-actions" class="battle-actions">
        <button class="btn" data-battle="attack">โจมตี</button>
        <button class="btn" data-battle="skill">สกิล</button>
        <button class="btn" data-battle="item">ไอเทม</button>
        <button class="btn" data-battle="flee">หนี</button>
      </div>
      <div id="battle-submenu" class="battle-submenu"></div>
    </section>

    <!-- Modal overlay for menus / dialog / shop -->
    <div id="overlay" class="overlay">
      <div id="overlay-panel" class="overlay-panel">
        <button id="overlay-close" class="overlay-close">✕</button>
        <div id="overlay-content"></div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Dialogue / cutscene layer (visual-novel) -->
    <div id="dialogue" class="dialogue-layer"></div>

    <!-- Minigame layer -->
    <div id="minigame" class="mg-layer"></div>

    <!-- Transition / flash layer -->
    <div id="transition"></div>

    <!-- ปุ่มเปิด/ปิดเสียง -->
    <button id="sound-toggle" title="เปิด/ปิดเสียง">🔊</button>

    <!-- ตัวบ่งชี้บันทึกอัตโนมัติ -->
    <div id="save-indicator">💾 บันทึกแล้ว</div>

    <!-- แชท multiplayer -->
    <button id="chat-toggle" title="แชท">💬<span id="chat-badge"></span></button>
    <div id="chat-panel">
      <div class="chat-head">
        <span>💬 แชทโลก</span>
        <span class="chat-online" id="chat-online">🟢 0 ออนไลน์</span>
        <button id="chat-close">✕</button>
      </div>
      <div id="chat-msgs" class="chat-msgs"></div>
      <div class="chat-input">
        <input id="chat-text" type="text" maxlength="200" placeholder="พิมพ์ข้อความ..." />
        <button id="chat-send" class="btn small">ส่ง</button>
      </div>
    </div>
  </div>

  <script src="src/main.js"></script>
</body>
